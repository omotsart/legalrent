# Демонстрационный фрагмент: 2 категории из 9. Полный playbook — часть закрытой версии.
#
# playbook.yaml — свод правил оценки правок договора аренды.
# Позиция: арендодатель (perspective: landlord). MVP — только эта перспектива.
# baseline-значения взяты из эталонного договора (данные обезличены; ИП Иванова И.И.).
#
# КАК ЧИТАЕТ КОД (архитектурная подпись «LLM извлекает — код решает»):
#   1. LLM/правила извлекают из правки арендатора значение параметра `param`.
#   2. Код сравнивает его с `baseline` по направлению `direction`.
#   3. Код выносит вердикт по `verdict_map` (🟢 лучше / 🟡 нейтрально / 🟠 хуже / 🔴 сильно хуже).
#   4. Если правка не попала ни в одну категорию → 🟡 «вне параметрической модели» (не молчим).

version: "0.4-draft"          # трассируется в каждый вердикт (playbook_version)
perspective: landlord         # MVP: только арендодатель. tenant — backlog (поле зарезервировано).

categories:

  # ─────────────────────────────────────────────────────────────────
  - category: penalty_rate
    title: "Пеня за просрочку платежа"
    source_clause: "4.1"
    param: daily_penalty_percent      # ставка пени, % в день от месячной платы
    baseline: 1.0                      # договор: 1% в день — СТАРТОВАЯ позиция «с запасом»
    floor: 0.8                         # ниже 0.8%/день уступать не готовы (узкий коридор)
    unit: "percent_per_day"
    direction: lower_is_worse
    cluster: payment_security          # часть платёжного блока
    verdict_map:
      better:  ">= 1.0"                # 🟢 держит стартовую ставку
      neutral: "0.8 .. 1.0"            # 🟡 узкий коридор уступки (1%→0.8%)
      worse:   "0.1 .. 0.8"            # 🟠 пробит floor
      severe:  "< 0.1"                 # 🔴 символическая пеня
    gk_reference: "ст. 330 ГК РФ (неустойка)"
    counterargument: >
      Высокая ставка пени носит дисциплинирующий, а не фискальный характер:
      просрочка терпится не более месяца, после чего договор расторгается.
      При своевременной оплате пеня арендатора не затрагивает вовсе.
      Приемлемое снижение — до 0,8%/день; дальнейшее лишает неустойку
      обеспечительной функции на коротком горизонте до расторжения.

  # ─────────────────────────────────────────────────────────────────
  - category: capital_repair
    title: "Капитальный ремонт за счёт арендодателя (ст. 616 ГК РФ)"
    source_clause: "2.2.3, 4.2"
    param: capital_repair_shifted_to_landlord  # bool: правка возлагает капремонт/зачёт на АД в любой форме
    baseline: false                            # договор: капремонта за счёт АД нет
    unit: "boolean"
    direction: red_line                        # ⛔ КРАСНАЯ ЛИНИЯ — на срочном договоре недопустимо в любом виде
    redline_rationale: >
      Договор срочный (11 мес). Капитальный ремонт — ремонт инженерных сетей,
      капитальных конструкций и иных несущих элементов — несоразмерен сроку
      аренды и не может быть возложен на арендодателя ни в форме обязанности,
      ни в форме зачёта стоимости работ в счёт арендной платы.
    verdict_map:
      better:  "false"                         # 🟢 капремонт на АД не вписан (= эталон)
      neutral: null                            # промежуточного состояния НЕТ — это красная линия
      worse:   null
      severe:  "true_any_form"                 # 🔴 вписан в любой форме (обязанность ИЛИ зачёт ИЛИ согласование)
    gk_reference: "ст. 616 ГК РФ (диспозитивна — может быть отнесена на арендатора)"
    counterargument: >
      По п. 1 ст. 616 ГК РФ обязанность капитального ремонта диспозитивна и
      договором отнесена на арендатора. Капремонт (инженерные сети, капитальные
      конструкции) несоразмерен 11-месячному сроку; возложение его на
      арендодателя — в т.ч. через зачёт стоимости в счёт платы — отклоняется
      по существу, а не как «неудобное» условие.

# ─────────────────────────────────────────────────────────────────────
# ВНЕ МОДЕЛИ: всё, что не попало в категории выше → вердикт 🟡
# «вне параметрической модели» + текст правки на ручной просмотр юристом.
# Движок НЕ молчит на неизвестной правке.
#
# Полная версия playbook содержит 9 категорий и 2 красные линии
# (capital_repair и субаренда) и является частью закрытой версии продукта.
